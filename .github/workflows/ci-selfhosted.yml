name: CI (self-hosted)

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - visualization

jobs:
  run-modules-local:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Create artifacts directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\data_load
          New-Item -ItemType Directory -Force -Path artifacts\visualization

      - name: Run data_load module
        if: github.event.inputs.module == 'all' || github.event.inputs.module == 'data_load'
        shell: powershell
        run: |
          Set-Location src
          python data_load.py *> ..\artifacts\data_load\run.log
          Set-Location ..

      - name: Run visualization notebook
        id: visualization_step
        if: github.event.inputs.module == 'all' || github.event.inputs.module == 'visualization'
        shell: powershell
        continue-on-error: true
        run: |
          python -m jupyter nbconvert `
            --to html `
            --execute notebooks/visualization.ipynb `
            --output visualization `
            --output-dir artifacts/visualization `
            1> artifacts/visualization/stdout.log `
            2> artifacts/visualization/stderr.log
          
          "exitcode=$LASTEXITCODE" >> $env:GITHUB_OUTPUT

      - name: Upload data_load artifacts
        if: always() && (github.event.inputs.module == 'all' || github.event.inputs.module == 'data_load')
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_load-selfhosted
          path: artifacts/data_load

      - name: Upload visualization artifacts
        if: always() && (github.event.inputs.module == 'all' || github.event.inputs.module == 'visualization')
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization-selfhosted
          path: artifacts/visualization

      - name: Show visualization error log
        if: always() && (github.event.inputs.module == 'all' || github.event.inputs.module == 'visualization')
        shell: powershell
        run: |
          if (Test-Path artifacts/visualization/stderr.log) {
            Write-Host "===== stderr.log ====="
            Get-Content artifacts/visualization/stderr.log
          }
          
          if (Test-Path artifacts/visualization/stdout.log) {
            Write-Host "===== stdout.log ====="
            Get-Content artifacts/visualization/stdout.log
          }
          
          if ("${{ steps.visualization_step.outputs.exitcode }}" -ne "0") {
            exit 1
          }