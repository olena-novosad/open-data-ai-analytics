name: Deploy results to GitHub Pages

on:
  workflow_run:
    workflows: ["CI (modules)"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install jupyter nbconvert

      - name: Build site
        run: |
          mkdir -p _site

          jupyter nbconvert \
            --to html \
            --execute notebooks/visualization.ipynb \
            --output visualization.html \
            --output-dir _site

          jupyter nbconvert \
            --to html \
            --execute notebooks/data_research.ipynb \
            --output data_research.html \
            --output-dir _site

          if [ -d artifacts ]; then
            cp -r artifacts _site/ || true
          fi

          if [ -d reports/figures ]; then
            cp -r reports/figures _site/figures || true
          fi

          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Project Results</title>
          </head>
          <body>
            <h1>Project Results</h1>
            <p>Generated automatically from GitHub Actions.</p>

            <h2>Reports</h2>
            <ul>
              <li><a href="./visualization.html">Visualization Report</a></li>
              <li><a href="./data_research.html">Data Research Report</a></li>
            </ul>

            <h2>Figures</h2>
            <ul>
              <li><a href="./figures/">Open Figures Folder</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4